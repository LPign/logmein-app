name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t lpign/logmein-backend:latest ./backend

      - name: Push backend image
        run: docker push lpign/logmein-backend:latest

      - name: Build frontend image
        run: docker build -t lpign/logmein-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push lpign/logmein-frontend:latest
