version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: logmein-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: logmein-backend
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "5000:5000"
    networks:
      - backend-network
      - frontend-network
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: logmein-frontend
    ports:
      - "3000:80"
    networks:
      - frontend-network
    depends_on:
      - backend
    restart: unless-stopped


volumes:
  postgres_data:

networks:
  backend-network:
  frontend-network: